<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jehova Mekaddesh Ministries</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            /* Ajustamos el fondo para que la vela resalte mejor en la parte inferior */
            background: radial-gradient(circle, #1a1008 0%, #070503 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* VELA CORREGIDA: Más visible y mejor posicionada */
        .candle-bg {
            position: fixed;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 200px;
            opacity: 0.35; /* Incrementamos la opacidad para que sea totalmente visible */
            z-index: 0;    /* Se mantiene en el fondo */
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candle-body {
            width: 45px;
            height: 100px;
            background: linear-gradient(to right, #d4a373, #faedcd, #d4a373);
            border-radius: 4px 4px 0 0;
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.5), 0 0 20px rgba(212, 163, 115, 0.3);
        }

        .candle-wick {
            width: 3px;
            height: 10px;
            background-color: #222;
        }

        .candle-flame {
            width: 22px;
            height: 40px;
            background: radial-gradient(circle at bottom, #ffffff 10%, #ffea00 30%, #ff6a00 70%, rgba(255,0,0,0) 100%);
            border-radius: 50% 50% 20% 20% / 70% 70% 40% 40%;
            box-shadow: 0 0 25px #ffea00, 0 0 45px #ff6a00;
            animation: flicker 1.5s infinite alternate, sway 2.5s ease-in-out infinite alternate;
            transform-origin: bottom center;
            margin-bottom: 2px;
        }

        /* Animaciones de la llama */
        @keyframes flicker {
            0% { transform: scale(0.95) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.05) rotate(1deg); opacity: 1; }
        }
        @keyframes sway {
            0% { transform: skewX(-3deg); }
            100% { transform: skewX(3deg); }
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            background: rgba(15, 11, 8, 0.82); /* Un toque más de solidez */
            padding: 25px 20px;
            border-radius: 16px;
            border: 1px solid rgba(212, 163, 115, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1; /* Asegura que el contenido quede al frente de la vela */
            margin-bottom: 60px; /* Despeja el espacio inferior para que luzca la vela */
        }

        .banner-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            display: block;
        }

        .artwork-box {
            width: 100%;
            height: 220px;
            margin: 15px 0 25px 0;
            border-radius: 10px;
            background: url('https://thumbs.dreamstime.com/b/la-palabra-b%C3%ADblica-de-dios-espada-con-fuego-afecta-el-evangelio-ilustraci%C3%B3n-ai-generativa-salvaci%C3%B3n-273454912.jpg') center no-repeat;
            background-size: cover;
            border: 1px solid rgba(243, 156, 18, 0.2);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.6);
            position: relative;
        }

        .artwork-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(15, 11, 8, 1) 100%);
            pointer-events: none;
        }

        h1 {
            font-size: 1.7rem;
            color: #e6b86a;
            letter-spacing: 1px;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 2px 12px rgba(230, 184, 106, 0.3);
        }

        .subtitle {
            font-size: 1.05rem;
            color: #ccc2b3;
            margin-bottom: 12px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .highlight {
            font-size: 1.25rem;
            color: #ff4444;
            letter-spacing: 5px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(255, 68, 68, 0.4);
        }

        .btn {
            display: block;
            background: linear-gradient(135deg, rgba(50,35,25,0.6) 0%, rgba(25,15,10,0.9) 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 16px;
            border: 1px solid rgba(230, 184, 106, 0.35);
            border-radius: 30px;
            font-size: 1.05rem;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .btn:hover {
            background: linear-gradient(135deg, #e6b86a 0%, #b37d35 100%);
            color: #070503;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 184, 106, 0.4);
            border-color: #ffffff;
            font-weight: bold;
        }

        .btn-whatsapp:hover {
            background: linear-gradient(135deg, #25D366 0%, #075E54 100%);
            color: #ffffff;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- VELA DISCRETA DE FONDO CON PARÁMETROS OPTIMIZADOS -->
    <div class="candle-bg">
        <div class="candle-flame"></div>
        <div class="candle-wick"></div>
        <div class="candle-body"></div>
    </div>

    <div class="container">
        <!-- Banner Autoría (Guerrero y Arquera) -->
        <img src="https://watermarked-img-1007539128318240212.png" alt="Jehova Mekaddesh Ministries" class="banner-img">

        <h1>Jehova Mekaddesh Ministries</h1>
        <div class="subtitle">Ministraciones • Consejerías • Oraciones</div>
        <div class="highlight">— Liberaciones —</div>

        <!-- Espada del Espíritu e Ilustración Bíblica Realista -->
        <div class="artwork-box"></div>

        <!-- Botones de Redes Actualizados -->
        <a href="https://www.soulcenters.org/directory/jehova-mekaddesh-ministries/" class="btn" target="_blank">Visitar Sitio Oficial</a>
        <a href="https://wa.me/15098300959?text=Bendiciones%20Hna.%20Mary,%20deseo%20comunicarme%20con%20el%20ministerio%20Jehova%20Mekaddesh." class="btn btn-whatsapp" target="_blank">WhatsApp Hna. Mary</a>
    </div>

</body>
</html>
