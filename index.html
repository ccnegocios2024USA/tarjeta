<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jehova Mekaddesh Ministries</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            /* Fondo oscuro premium con destello cálido en el centro */
            background: radial-gradient(circle, #1a1008 0%, #070503 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* VELA SOBRIA Y ELEGANTE DE FONDO */
        .candle-bg {
            position: fixed;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 220px;
            opacity: 0.12; /* Muy discreta y sutil para no opacar el contenido */
            z-index: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candle-body {
            width: 50px;
            height: 140px;
            background: linear-gradient(to right, #d4a373, #faedcd, #d4a373);
            border-radius: 4px 4px 0 0;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.3);
        }

        .candle-wick {
            width: 3px;
            height: 12px;
            background-color: #333;
        }

        .candle-flame {
            width: 24px;
            height: 45px;
            background: radial-gradient(circle at bottom, #ffea00 20%, #ff6a00 60%, rgba(255,0,0,0) 100%);
            border-radius: 50% 50% 20% 20% / 70% 70% 40% 40%;
            box-shadow: 0 0 20px #ff6a00;
            animation: flicker s s infinite alternate, sway 3s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        /* Animaciones sutiles de la Llama */
        @keyframes flicker {
            0% { transform: scale(0.96) rotate(-1deg); opacity: 0.85; }
            100% { transform: scale(1.04) rotate(1deg); opacity: 1; }
        }
        @keyframes sway {
            0% { transform: skewX(-2deg); }
            100% { transform: skewX(2deg); }
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            background: rgba(15, 11, 8, 0.75);
            padding: 25px 20px;
            border-radius: 16px;
            border: 1px solid rgba(212, 163, 115, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1;
        }

        /* NUEVA IMAGEN DE ENCABEZADO (Guerrero y Archer Ilustrados) */
        .banner-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            display: block;
        }

        /* ARTE DE LA ESPADA CON FUEGO Y BIBLIA ABIERTA */
        .artwork-box {
            width: 100%;
            height: 220px;
            margin: 15px 0 25px 0;
            border-radius: 10px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600') center no-repeat; /* Respaldo elegante */
            /* Aquí usamos la potente ilustración artística de la palabra, la espada y el fuego */
            background-image: url('https://thumbs.dreamstime.com/b/la-palabra-b%C3%ADblica-de-dios-espada-con-fuego-afecta-el-evangelio-ilustraci%C3%B3n-ai-generativa-salvaci%C3%B3n-273454912.jpg');
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(243, 156, 18, 0.2);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.6);
            position: relative;
        }

        .artwork-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(15, 11, 8, 1) 100%);
            pointer-events: none;
        }

        h1 {
            font-size: 1.7rem;
            color: #e6b86a;
            letter-spacing: 1px;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 2px 12px rgba(230, 184, 106, 0.3);
        }

        .subtitle {
            font-size: 1.05rem;
            color: #ccc2b3;
            margin-bottom: 12px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .highlight {
            font-size: 1.25rem;
            color: #ff4444;
            letter-spacing: 5px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(255, 68, 68, 0.4);
        }

        /* BOTONES PREMIUM */
        .btn {
            display: block;
            background: linear-gradient(135deg, rgba(50,35,25,0.6) 0%, rgba(25,15,10,0.9) 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 16px;
            border: 1px solid rgba(230, 184, 106, 0.35);
            border-radius: 30px;
            font-size: 1.05rem;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .btn:hover {
            background: linear-gradient(135deg, #e6b86a 0%, #b37d35 100%);
            color: #070503;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 184, 106, 0.4);
            border-color: #ffffff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- VELA DISCRETA DE FONDO DEBIDAMENTE ENMAQUETADA -->
    <div class="candle-bg">
        <div class="candle-flame"></div>
        <div class="candle-wick"></div>
        <div class="candle-body"></div>
    </div>

    <div class="container">
        <!-- Banner Autoría (Guerrero y Arquera) -->
        <img src="https://watermarked-img-1007539128318240212.png" alt="Jehova Mekaddesh Ministries" class="banner-img" onerror="this.src='https://ccnegocios2024usa.github.io/tarjeta/index.html';">

        <h1>Jehova Mekaddesh Ministries</h1>
        <div class="subtitle">Ministraciones • Consejerías • Oraciones</div>
        <div class="highlight">— LIBERACIÓN —</div>

        <!-- Espada del Espíritu e Ilustración Bíblica Realista -->
        <div class="artwork-box"></div>

        <!-- Botones de Redes Activos -->
        <a href="https://www.soulcenters.org/directory/jehova-mekaddesh-ministries/" class="btn" target="_blank">Visitar Sitio Oficial</a>
        <a href="https://www.facebook.com/share/18tKVg98Y3/" class="btn" target="_blank">Contactar por Facebook</a>
    </div>

</body>
</html>
